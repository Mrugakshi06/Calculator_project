<!DOCTYPE html>
<!-- Standard HTML5 document type declaration -->
<html lang="en">
<head>
    <!-- Defines character encoding for the document (UTF-8 supports all characters) -->
    <meta charset="UTF-8">
    
    <!-- Ensures proper rendering and touch zooming on mobile devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- SEO Description: Helps search engines understand what the page is about -->
    <meta name="description" content="A premium, sleek, and highly functional calculator with modern glassmorphism design and robust error handling.">
    
    <!-- The title of the page that appears in the browser tab -->
    <title>Premium Calculator | Sleek & Precise</title>
    
    <!-- Importing 'Outfit' font from Google Fonts for a modern, high-end look -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    
    <!-- Linking our external CSS file for styling -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Background elements: These 'blobs' create the colorful, blurred background aesthetic -->
    <div class="background-blobs">
        <div class="blob blob-1"></div> <!-- Large blue blob -->
        <div class="blob blob-2"></div> <!-- Indigo blob -->
        <div class="blob blob-3"></div> <!-- Magenta blob -->
    </div>

    <!-- Main calculator interface container -->
    <main class="calculator-container">
        <!-- Header: Displays the app name and a small glowing status dot -->
        <header class="calc-header">
            <h1>CalcPro</h1>
            <div class="status-indicator"></div>
        </header>

        <!-- Display Area: Where the numbers and error messages are shown -->
        <section class="display-area">
            <!-- previous-operand: Shows the previous number and the current operator (e.g., "12 +") -->
            <div id="previous-operand" class="previous-operand"></div>
            <!-- current-operand: Shows the number currently being typed or the final result -->
            <div id="current-operand" class="current-operand">0</div>
            <!-- error-message: Area dedicated to showing input errors (e.g., "Cannot divide by zero") -->
            <div id="error-message" class="error-message"></div>
        </section>

        <!-- Button Grid: Organized in a 4-column layout using CSS Grid -->
        <section class="button-grid">
            <!-- Row 1: Special functions -->
            <button class="btn btn-secondary" onclick="clearDisplay()" id="clear">AC</button> <!-- Clear All -->
            <button class="btn btn-secondary" onclick="deleteLast()" id="delete">DEL</button> <!-- Backspace -->
            <button class="btn btn-secondary" onclick="appendOperator('%')" id="percent">%</button> <!-- Percentage -->
            <button class="btn btn-accent" onclick="appendOperator('/')" id="divide">÷</button> <!-- Division -->

            <!-- Row 2: Numbers 7-9 and Multiplication -->
            <button class="btn" onclick="appendNumber('7')" id="num-7">7</button>
            <button class="btn" onclick="appendNumber('8')" id="num-8">8</button>
            <button class="btn" onclick="appendNumber('9')" id="num-9">9</button>
            <button class="btn btn-accent" onclick="appendOperator('*')" id="multiply">×</button>

            <!-- Row 3: Numbers 4-6 and Subtraction -->
            <button class="btn" onclick="appendNumber('4')" id="num-4">4</button>
            <button class="btn" onclick="appendNumber('5')" id="num-5">5</button>
            <button class="btn" onclick="appendNumber('6')" id="num-6">6</button>
            <button class="btn btn-accent" onclick="appendOperator('-')" id="subtract">−</button>

            <!-- Row 4: Numbers 1-3 and Addition -->
            <button class="btn" onclick="appendNumber('1')" id="num-1">1</button>
            <button class="btn" onclick="appendNumber('2')" id="num-2">2</button>
            <button class="btn" onclick="appendNumber('3')" id="num-3">3</button>
            <button class="btn btn-accent" onclick="appendOperator('+')" id="add">+</button>

            <!-- Row 5: Zero, Decimal, and Equals -->
            <button class="btn btn-large" onclick="appendNumber('0')" id="num-0">0</button> <!-- Spans 2 columns -->
            <button class="btn" onclick="appendNumber('.')" id="decimal">.</button>
            <button class="btn btn-primary" onclick="compute()" id="equals">=</button> <!-- Primary blue button -->
        </section>
    </main>

    <!-- Linking our external JavaScript file for functionality -->
    <script src="script.js"></script>
</body>
</html>
